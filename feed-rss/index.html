<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feed RSS</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <div class="feed-rss">
    <h1>Feed RSS Panel</h1>
    <p>Enter the RSS feed URL:</p>
    <form onsubmit="postUpdateNews(event)">
      <input type="text" name="rssUrl" placeholder="Enter RSS feed URL" required>
      <button type="submit">Submit</button>
    </form>
    <p>Update news</p>
    <button onclick="newsUpdate()">Update News</button>
  </div>

  <!-- FILTROS DESPLEGABLES -->
  <div class="filters-wrapper">
    <div class="filters-header" onclick="toggleFilters()">
      <h3>Search & Filter News</h3>
      <span class="toggle-icon" id="toggleIcon">▼</span>
    </div>
    
    <div class="filters-content" id="filtersContent">
      <div class="filters-grid">
        <!-- Búsqueda por texto -->
        <div class="filter-item">
          <label for="searchInput">Search:</label>
          <input 
            type="text" 
            id="searchInput" 
            placeholder="Search in title/description..."
            onkeyup="applyFilters()"
          >
        </div>
        
        <!-- Filtro por categoría -->
        <div class="filter-item">
          <label for="categoryFilter">Category:</label>
          <input 
            type="text" 
            id="categoryFilter" 
            placeholder="Filter by category..."
            onkeyup="applyFilters()"
          >
        </div>
        
        <!-- Ordenamiento -->
        <div class="filter-item">
          <label for="sortBy">Sort by:</label>
          <select id="sortBy" onchange="applyFilters()">
            <option value="date">Date</option>
            <option value="title">Title</option>
            <option value="url">URL</option>
            <option value="description">Description</option>
            <option value="categories">Category</option>
          </select>
        </div>
        
        <div class="filter-item">
          <label for="sortDir">Direction:</label>
          <select id="sortDir" onchange="applyFilters()">
            <option value="ASC">Ascending</option>
            <option value="DESC">Descending</option>
          </select>
        </div>
        
        <!-- Botón para limpiar -->
        <div class="clear-filters-btn">
          <button onclick="clearFilters()">Clear All Filters</button>
        </div>
      </div>
    </div>
  </div>
  
  <div id="news-container">
    <h1>News</h1>
  </div>
  
  <script src="update.js"></script>

  <!-- Función para toggle de filtros -->
  <script>
    function toggleFilters() {
      const content = document.getElementById('filtersContent');
      const header = document.querySelector('.filters-header');
      const icon = document.getElementById('toggleIcon');
      
      content.classList.toggle('show');
      header.classList.toggle('active');
      
      if (content.classList.contains('show')) {
        icon.textContent = '▲';
      } else {
        icon.textContent = '▼';
      }
    }
  </script>
</body>
</html>
